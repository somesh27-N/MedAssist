// ── CONTEXT ───────────────────────────────────────────────────────────────────

const AppCtx = createContext(null);

function AppProvider({children}) {

  const [user, setUser] = useState(null);

  const [view, setView] = useState('dashboard');

  const [permissions, setPermissions] = useState({
    'Kapoor': { id: 'Kapoor', name: 'Dr. S. Kapoor', hospital: 'AIIMS New Delhi', status: 'authorized' },
    'Mehta': { id: 'Mehta', name: 'Dr. R. Mehta', hospital: 'City Hospital Delhi', status: 'authorized' },
    'Joshi': { id: 'Joshi', name: 'Dr. Anand Joshi', hospital: 'AIIMS New Delhi', status: 'authorized' }
  });

  const [accessLogs, setAccessLogs] = useState([
    { id: 1, viewer: 'Dr. S. Kapoor (AIIMS)', time: '12 Jun 2026, 10:24 AM', method: 'QR Scan', status: 'Success', reason: 'Routine Diabetes Follow-up' },
    { id: 2, viewer: 'Apollo Hospital (ER)', time: '10 Jun 2026, 11:05 PM', method: 'Biometric Scan', status: 'Success', reason: 'Emergency Override (Accident)' },
    { id: 3, viewer: 'Dr. R. Mehta (City Hospital)', time: '08 Jun 2026, 02:15 PM', method: 'UID + OTP', status: 'Success', reason: 'BP Prescription Update' },
    { id: 4, viewer: 'Dr. S. Kapoor (AIIMS)', time: '05 Jun 2026, 09:45 AM', method: 'QR Scan', status: 'Blocked', reason: 'Routine Checkup (Attempted)' }
  ]);

  const [activePatientSession, setActivePatientSession] = useState(null);

  const togglePermission = (id) => {
    setPermissions(prev => ({
      ...prev,
      [id]: {
        ...prev[id],
        status: prev[id].status === 'authorized' ? 'blocked' : 'authorized'
      }
    }));
  };

  const addAccessLog = (log) => {
    setAccessLogs(prev => [
      ...prev,
      {
        id: prev.length + 1,
        ...log
      }
    ]);
  };

  return (

    <AppCtx.Provider value={{

      user, view, setView,

      login:(role,data)=>{
        setUser({role,...data});
        setView(role === 'doctor' ? 'doctor_view' : 'dashboard');
        setActivePatientSession(null);
      },

      logout:()=>{
        setUser(null);
        setView('dashboard');
        setActivePatientSession(null);
      },

      permissions,
      accessLogs,
      activePatientSession,
      setActivePatientSession,
      togglePermission,
      addAccessLog

    }}>

      {children}

    </AppCtx.Provider>

  );

}

const useApp = () => useContext(AppCtx);



// ── UI PRIMITIVES ─────────────────────────────────────────────────────────────

function Badge({variant='teal',children,className=''}) {

  const v = {

    teal:'bg-teal-50 text-teal-700 border-teal-100',

    red:'bg-red-50 text-red-600 border-red-100',

    amber:'bg-amber-50 text-amber-700 border-amber-100',

    green:'bg-green-50 text-green-700 border-green-100',

    gray:'bg-gray-100 text-gray-500 border-gray-200',

    purple:'bg-purple-50 text-purple-600 border-purple-100',

  };

  return <span className={`badge ${v[variant]||v.teal} ${className}`}>{children}</span>;

}



function Card({children,noPad,className=''}) {

  return <div className={`card ${className}`}>{noPad?children:<div className="p-5">{children}</div>}</div>;

}

function CardHeader({title,icon,action,onAction}) {

  return (

    <div className="flex items-center justify-between px-5 py-3.5 border-b border-gray-100">

      <div className="flex items-center gap-2 text-sm font-medium text-navy-600">

        {icon && <i className={`ti ${icon} text-teal-500 text-base`}/>}

        {title}

      </div>

      {action && <button onClick={onAction} className="text-xs text-teal-600 hover:text-teal-700 cursor-pointer bg-transparent border-none transition-colors">{action}</button>}

    </div>

  );

}



function StatCard({icon,iconBg,value,label,badge,badgeVariant}) {

    <div className="card p-4 flex flex-col gap-1">

      <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-base mb-1 ${iconBg}`}>

      </div>

      <div className="font-display font-semibold text-2xl text-navy-600">{value}</div>

      <div className="text-xs text-gray-400">{label}</div>

      {badge && <Badge variant={badgeVariant} className="w-fit mt-0.5">{badge}</Badge>}

    </div>

  );

}



function StatusDot({status}) {

  const c = status==='active'?'bg-red-400':status==='managed'?'bg-amber-400':'bg-gray-300';

  return <span className={`inline-block w-2 h-2 rounded-full flex-shrink-0 ${c}`}/>;

// ── LOGIN ─────────────────────────────────────────────────────────────────────

function LoginScreen() {

  const {login} = useApp();

  const [portal,setPortal] = useState('user');

  const [method,setMethod] = useState('Aadhaar');

  const [loading,setLoading] = useState(false);

  // Signup states
  const [isSignUp, setIsSignUp] = useState(false);
  const [googleConnected, setGoogleConnected] = useState(false);

  // Citizen signup inputs
  const [citizenName, setCitizenName] = useState('');
  const [citizenPhone, setCitizenPhone] = useState('');
  const [citizenEmail, setCitizenEmail] = useState('');
  const [citizenAadhaar, setCitizenAadhaar] = useState('');
  const [citizenOtp, setCitizenOtp] = useState('');

  // Doctor signup inputs

  const [doctorPhone, setDoctorPhone] = useState('');
  const [doctorEmail, setDoctorEmail] = useState('');
  const [doctorLicense, setDoctorLicense] = useState('');
  const [doctorHospital, setDoctorHospital] = useState('');

  const [loginOtp, setLoginOtp] = useState('');
  const [loginLicense, setLoginLicense] = useState('');
  const [loginHospital, setLoginHospital] = useState('');
  const [loginPassword, setLoginPassword] = useState('');

  const handleGoogleConnect = () => {
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      setGoogleConnected(true);
      if (portal === 'doctor') {
        setDoctorName('Dr. Anand Joshi');
        setDoctorEmail('dr.anand.joshi@gmail.com');
      } else {
        setCitizenName('Rahul Sharma');
        setCitizenEmail('rahul.sharma@gmail.com');
      }
    }, 800);
  };

  const doSubmit = () => {
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (portal === 'hospital') {
        login('user', PATIENT);
        return;
      }

      if (isSignUp) {
        if (portal === 'doctor') {
          const docData = {
            ...PATIENT,
            name: doctorName || 'Dr. Anand Joshi',
            phone: doctorPhone || '+91 98100 XXXXX',
            email: doctorEmail || 'dr.anand.joshi@gmail.com',
            uid: doctorLicense || 'MCI-DL-9938102',
            hospital: doctorHospital || 'AIIMS New Delhi'
          };
          login('doctor', docData);
        } else {
          const patData = {
            ...PATIENT,
            name: citizenName || 'Rahul Sharma',
            phone: citizenPhone || '+91 98100 XXXXX',
            email: citizenEmail || 'rahul.sharma@gmail.com',
            uid: citizenAadhaar ? `${citizenAadhaar.slice(0,4)}-XXXX-${citizenAadhaar.slice(-4)}` : '7823-XXXX-4401'
          };
          login('user', patData);
        }
      } else {
        // Sign In
        if (portal === 'doctor') {
          const docData = {
            ...PATIENT,
            name: 'Dr. S. Kapoor',
            uid: loginLicense || 'MCI-DL-8829103',
            hospital: loginHospital || 'AIIMS New Delhi'
          };
          login('doctor', docData);
        } else {
          const patData = {
            ...PATIENT,
            phone: loginPhone || PATIENT.phone,
            uid: loginAadhaar ? `${loginAadhaar.slice(0,4)}-XXXX-${loginAadhaar.slice(-4)}` : PATIENT.uid
          };
          login('user', patData);
        }
      }
    }, 1100);
  };



  return (

    <div className="min-h-screen flex flex-col items-center justify-center p-4 animate-fade-in relative overflow-hidden"

          {[['user','Citizen','ti-user'],['doctor','Doctor','ti-stethoscope'],['hospital','Hospital','ti-building-hospital']].map(([id,label,ic])=>(

            <button key={id} onClick={()=>{ setPortal(id); setGoogleConnected(false); }}

                color:portal===id?'#4DD2CC':'rgba(255,255,255,0.35)',

        <div className="p-6">

                <div>

                  <input className="input-field" type="email" value={doctorEmail} onChange={e=>setDoctorEmail(e.target.value)} placeholder="e.g. dr.anand@gmail.com"/>
                </div>
                <div>
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">MCI Licence ID</label>
                  <input className="input-field" value={doctorLicense} onChange={e=>setDoctorLicense(e.target.value)} placeholder="MCI-DL-XXXXXXXX"/>
                </div>
                <div>
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Hospital</label>
                  <input className="input-field" value={doctorHospital} onChange={e=>setDoctorHospital(e.target.value)} placeholder="e.g. AIIMS New Delhi"/>
                </div>
                <div className="mb-5">
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Password</label>
                  <input type="password" className="input-field" value={doctorPassword} onChange={e=>setDoctorPassword(e.target.value)} placeholder="Secure password"/>
                </div>
              </div>
            ) : (
              // Doctor Login
              <div className="space-y-4">
                <div>
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">MCI Licence ID</label>
                  <input className="input-field" value={loginLicense} onChange={e=>setLoginLicense(e.target.value)} placeholder="MCI-DL-XXXXXXXX"/>
                </div>
                <div>
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Hospital</label>
                  <input className="input-field" value={loginHospital} onChange={e=>setLoginHospital(e.target.value)} placeholder="e.g. AIIMS New Delhi"/>
                </div>
                <div className="mb-5">
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Password</label>
                  <input type="password" className="input-field" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} placeholder="Secure password"/>
                </div>
              </div>
            )
          ) : (
            // Citizen (Patient) Portal
            isSignUp ? (
              // Citizen Sign Up
              <div className="space-y-4 animate-fade-in">
                <div>
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Full Name</label>
                  <input className="input-field" value={citizenName} onChange={e=>setCitizenName(e.target.value)} placeholder="e.g. Rahul Sharma"/>
                </div>
                <div>
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Phone number</label>
                  <input className="input-field" value={citizenPhone} onChange={e=>setCitizenPhone(e.target.value)} placeholder="+91 XXXXX XXXXX"/>
                </div>
                <div>
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Google Email ID</label>
                  <input className="input-field" type="email" value={citizenEmail} onChange={e=>setCitizenEmail(e.target.value)} placeholder="e.g. rahul@gmail.com"/>
                </div>
                <div>
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Aadhaar number</label>
                  <input className="input-field" value={citizenAadhaar} onChange={e=>setCitizenAadhaar(e.target.value)} placeholder="XXXX XXXX XXXX"/>
                </div>
                <div className="mb-5">
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">OTP / PIN</label>
                  <input type="password" className="input-field" value={citizenOtp} onChange={e=>setCitizenOtp(e.target.value)} placeholder="Enter OTP sent to mobile"/>
                </div>
              </div>
            ) : (
              // Citizen Login
              <div className="space-y-4">
                <div>
                  <p className="text-white/40 text-xs uppercase tracking-widest mb-2">Verify via</p>
                  <div className="flex gap-2">
                    {['Aadhaar','Retina','Phone'].map(m=>(
                      <button key={m} onClick={()=>setMethod(m)}
                        className="flex-1 py-2 rounded-lg text-xs cursor-pointer transition-all"
                        style={{border:method===m?'1px solid rgba(77,210,204,0.5)':'1px solid rgba(255,255,255,0.1)',
                          background:method===m?'rgba(0,184,169,0.1)':'transparent',
                          color:method===m?'#4DD2CC':'rgba(255,255,255,0.4)'}}>
                        {m}
                      </button>
                    ))}
                  </div>
                </div>
                {method === 'Phone' ? (
                  <div>
                    <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Phone number</label>
                    <input className="input-field" value={loginPhone} onChange={e=>setLoginPhone(e.target.value)} placeholder="+91 XXXXX XXXXX"/>
                  </div>
                ) : method === 'Aadhaar' ? (
                  <div>
                    <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Aadhaar number</label>
                    <input className="input-field" value={loginAadhaar} onChange={e=>setLoginAadhaar(e.target.value)} placeholder="XXXX XXXX XXXX"/>
                  </div>
                ) : (
                  <div>
                    <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">Scan retina</label>
                    <input className="input-field" readOnly placeholder="Position eyes for scan"/>
                  </div>
                )}
                <div className="mb-5">
                  <label className="block text-white/40 text-xs uppercase tracking-widest mb-1.5">OTP / PIN</label>
                  <input type="password" className="input-field" value={loginOtp} onChange={e=>setLoginOtp(e.target.value)} placeholder="Enter OTP sent to mobile"/>
                </div>
              </div>
            )
          )}

          {!(portal === 'hospital' && isSignUp) && (
            <button onClick={doSubmit} disabled={loading} className="btn-primary mt-2 cursor-pointer" style={{opacity:loading?0.7:1}}>
              {loading
                ? <><span className="inline-block w-4 h-4 border-2 rounded-full" style={{borderColor:'rgba(255,255,255,0.3)',borderTopColor:'white',animation:'spin 1s linear infinite'}}/>{isSignUp ? 'Registering…' : 'Verifying…'}</>
                : <>{isSignUp ? 'Create Account & Sign in' : 'Verify & Sign in'} <i className="ti ti-arrow-right text-sm"/></>}
            </button>
          )}

          <div className="mt-5 text-center">
            {isSignUp ? (
              <p className="text-xs text-white/45">
                Already have an account?{' '}
                <button onClick={() => { setIsSignUp(false); setGoogleConnected(false); }} className="text-teal-400 hover:text-teal-300 font-semibold underline bg-transparent border-none cursor-pointer">
                  Sign in
                </button>
              </p>
            ) : (
              <p className="text-xs text-white/45">
                Don't have an account?{' '}
                <button onClick={() => { setIsSignUp(true); setGoogleConnected(false); }} className="text-teal-400 hover:text-teal-300 font-semibold underline bg-transparent border-none cursor-pointer">
                  Sign up
                </button>
              </p>
            )}
          </div>

        </div>

        <div className="px-6 pb-5 text-center">

          <p className="text-xs flex items-center justify-center gap-1.5" style={{color:'rgba(255,255,255,0.22)'}}>

            <span className="inline-block w-1.5 h-1.5 rounded-full bg-teal-400 animate-pulse-slow"/>

            Secured by Aadhaar + biometric · Govt of India

          </p>

        </div>

      </div>



      <button onClick={()=>login('user',PATIENT)}

        className="mt-5 text-xs underline cursor-pointer bg-transparent border-none transition-colors hover:opacity-60 z-10"

        style={{color:'rgba(255,255,255,0.25)'}}>

        Skip — enter as demo citizen →

      </button>

    </div>

  );

}

function DoctorView() {
  const { user, activePatientSession, setActivePatientSession, permissions, addAccessLog } = useApp();
  const [step, setStep] = useState(activePatientSession ? 'patient_dashboard' : 'verify_license');
  const [licenseId, setLicenseId] = useState(user?.uid || 'MCI-DL-9938102');
  const [verifyingLicense, setVerifyingLicense] = useState(false);
  const [patientUid, setPatientUid] = useState('7823-XXXX-4401');
  const [accessReason, setAccessReason] = useState('Routine Checkup');
  const [otp, setOtp] = useState('');
  const [requestingAccess, setRequestingAccess] = useState(false);
  const [errorMsg, setErrorMsg] = useState('');
  const [biometricScanning, setBiometricScanning] = useState(false);
  const [biometricProgress, setBiometricProgress] = useState(0);
  const [countdown, setCountdown] = useState(30);
  const [overrideUnlocked, setOverrideUnlocked] = useState(false);
  const [tab, setTab] = useState(0);

  // Auto-set step if patient session is active
  React.useEffect(() => {
    if (activePatientSession) {
      setStep('patient_dashboard');
      if (activePatientSession.mode === 'emergency') {
        setOverrideUnlocked(true);
      }
    } else {
      setStep('verify_license');
    }
  }, [activePatientSession]);

  // Handle countdown for emergency summary
  React.useEffect(() => {
    if (step !== 'emergency_summary') return;
    if (countdown <= 0) {
      addAccessLog({
        viewer: `${user.name} (${user.hospital})`,
        time: new Date().toLocaleString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
        method: 'Biometric Scan',
        status: 'Timeout',
        reason: 'Emergency Access Expired (30s limit)'
      });
      setErrorMsg('Emergency access window expired. Access has been locked.');
      setStep('request_access');
      return;
    }
    const timer = setTimeout(() => {
      setCountdown(countdown - 1);
    }, 1000);
    return () => clearTimeout(timer);
  }, [countdown, step]);

  const handleVerifyLicense = () => {
    setVerifyingLicense(true);
    setErrorMsg('');
    setTimeout(() => {
      setVerifyingLicense(false);
      setStep('request_access');
    }, 1200);
  };

  const handleRequestAccess = () => {
    setErrorMsg('');
    if (accessReason === 'Emergency') {
      setStep('emergency_biometric');
      return;
    }

    if (!otp) {
      setErrorMsg('Please enter the patient OTP.');
      return;
    }

    setRequestingAccess(true);
    setTimeout(() => {
      setRequestingAccess(false);
      const docKey = user.name.includes('Kapoor') ? 'Kapoor' : user.name.includes('Mehta') ? 'Mehta' : 'Joshi';
      const isBlocked = permissions[docKey]?.status === 'blocked';

      const logTime = new Date().toLocaleString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

      if (isBlocked) {
        addAccessLog({
          viewer: `${user.name} (${user.hospital})`,
          time: logTime,
          method: 'UID Search',
          status: 'Blocked',
          reason: `${accessReason} (Attempted)`
        });
        setErrorMsg('Access Denied: You have been blocked by the patient.');
        return;
      }

      if (otp !== '4401') {
        addAccessLog({
          viewer: `${user.name} (${user.hospital})`,
          time: logTime,
          method: 'UID Search',
          status: 'Failed',
          reason: `${accessReason} (Invalid OTP)`
        });
        setErrorMsg('Access Denied: Invalid OTP Code.');
        return;
      }

      // Successful Access
      addAccessLog({
        viewer: `${user.name} (${user.hospital})`,
        time: logTime,
        method: 'UID + OTP',
        status: 'Success',
        reason: accessReason
      });
      setActivePatientSession({ patient: PATIENT, mode: 'normal' });
    }, 1000);
  };

  const handleStartBiometricScan = () => {
    setBiometricScanning(true);
    setBiometricProgress(0);
    const interval = setInterval(() => {
      setBiometricProgress((prev) => {
        if (prev >= 100) {
          clearInterval(interval);
          setBiometricScanning(false);
          const logTime = new Date().toLocaleString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
          addAccessLog({
            viewer: `${user.name} (${user.hospital})`,
            time: logTime,
            method: 'Biometric Scan',
            status: 'Success',
            reason: 'Emergency Critical Summary Vitals'
          });
          setCountdown(30);
          setStep('emergency_summary');
          return 100;
        }
        return prev + 10;
      });
    }, 150);
  };

  const handleEmergencyOverride = () => {
    const logTime = new Date().toLocaleString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    addAccessLog({
      viewer: `${user.name} (${user.hospital})`,
      time: logTime,
      method: 'Emergency Override',
      status: 'Override Approved',
      reason: 'Accident/Trauma Override'
    });
    setOverrideUnlocked(true);
    setActivePatientSession({ patient: PATIENT, mode: 'emergency' });
    alert("Emergency override approved and logged. Patient's emergency contacts have been notified via SMS.");
  };

  const TABS = overrideUnlocked 
    ? ['Emergency summary','Full record','Blood bank','Lab reports']
    : ['Emergency summary','Blood bank'];

  if (step === 'patient_dashboard' && activePatientSession) {
    const patient = activePatientSession.patient;
    return (
      <div className="flex flex-col gap-5 animate-fade-in text-left">
        <div className="flex items-center justify-between">
          <AlertBanner variant="teal" icon="ti-qrcode"
            title={`QR-authenticated session · Patient: ${patient.name}`}
            detail={`UID: ${patient.uid} · Blood group: ${patient.bloodGroup} · Mode: ${activePatientSession.mode === 'emergency' ? 'Emergency Override Unlocked' : 'Standard View'}`}/>
          <button 
            onClick={() => {
              setActivePatientSession(null);
              setStep('request_access');
              setOverrideUnlocked(false);
            }} 
            className="px-4 py-2 border border-red-500/20 bg-red-500/10 text-red-400 hover:bg-red-500/20 text-xs font-semibold rounded-lg cursor-pointer transition-all flex items-center gap-1.5"
          >
            <i className="ti ti-lock"/> Close Session
          </button>
        </div>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          <StatCard icon="ti-drop" iconBg="bg-red-50 text-red-500" value={patient.bloodGroup} label="Blood group"/>
          <StatCard icon="ti-pill" iconBg="bg-amber-50 text-amber-600" value={patient.medications.length} label="Active meds"/>
          <StatCard icon="ti-heart" iconBg="bg-teal-50 text-teal-600" value={patient.organDonor?'Yes':'No'} label="Organ donor"/>
          <StatCard icon="ti-alert-circle" iconBg="bg-red-50 text-red-500" value={patient.dnr?'Active':'None'} label="DNR" badge={patient.dnr?'Active':'None'} badgeVariant={patient.dnr?'red':'gray'}/>
        </div>

        <Card noPad>
          <div className="flex border-b border-gray-100 overflow-x-auto">
            {TABS.map((t,i)=>(
              <button key={t} onClick={()=>setTab(i)}
                className="px-5 py-3 text-sm font-medium whitespace-nowrap -mb-px cursor-pointer bg-transparent border-l-0 border-r-0 border-t-0 transition-colors"
                style={{color:tab===i?'#00968A':'#9ca3af',borderBottom:tab===i?'2px solid #00B8A9':'2px solid transparent'}}>
                {t}
              </button>
            ))}
          </div>

          <div className="p-5">
            {tab===0 && (
              <div className="grid md:grid-cols-2 gap-6">
                <div>
                  <p className="text-xs font-medium text-gray-400 uppercase tracking-widest mb-3">Chronic conditions</p>
                  <div className="space-y-2">
                    {patient.currentDiseases.map(d=>(
                      <div key={d.id} className="flex items-start gap-2.5 bg-gray-50 rounded-xl px-3 py-2.5">
                        <StatusDot status="active"/><div className="text-left"><p className="text-sm font-medium text-navy-600">{d.name}</p><p className="text-xs text-gray-400">{d.note}</p></div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs font-medium text-gray-400 uppercase tracking-widest mt-4 mb-3">Current medications</p>
                  <div className="space-y-2">
                    {patient.medications.map(m=>(
                      <div key={m.id} className="flex items-center gap-2.5 bg-gray-50 rounded-xl px-3 py-2.5">
                        <span className="w-1.5 h-1.5 rounded-full bg-teal-400"/>
                        <p className="text-sm text-navy-600 flex-1 text-left">{m.name} <span className="text-gray-400">{m.dose}</span></p>
                        <Badge variant="teal">{m.frequency}</Badge>
                      </div>

                  </div>
                </div>

                <div>
                  <p className="text-xs font-medium text-gray-400 uppercase tracking-widest mb-3">Surgical history</p>
                  <div className="space-y-2">
                    {patient.surgeries.map(s=>(
                      <div key={s.id} className="bg-gray-50 rounded-xl px-3 py-2.5 text-left">
                        <p className="text-sm font-medium text-navy-600">{s.name}</p>
                        <p className="text-xs text-gray-400">{s.date} · {s.hospital}</p>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs font-medium text-gray-400 uppercase tracking-widest mt-4 mb-3">Emergency contacts</p>
                  <div className="space-y-2">
                    {patient.emergencyContacts.map(ec=>(
                      <div key={ec.id} className="flex items-center gap-3 rounded-xl px-3 py-2.5" style={{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.18)'}}>
                        <div className="w-7 h-7 rounded-full bg-amber-400 flex items-center justify-center text-xs text-white font-medium">
                          {ec.name.split(' ').map(n=>n[0]).join('')}
                        </div>
                        <div className="flex-1 text-left">
                          <p className="text-sm font-medium text-navy-600">{ec.name}</p>

                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {tab===1 && overrideUnlocked && (

              <h2 className="font-display text-lg font-semibold text-white mt-2">Patient Identified: Rahul Sharma</h2>

              <span>00:{countdown.toString().padStart(2, '0')}</span>
            </div>
          </div>

          <AlertBanner variant="red" icon="ti-alert-circle" title="DNR Order Documented" detail="Do Not Resuscitate (DNR) instruction is actively registered for this identity."/>

          <div className="grid sm:grid-cols-2 gap-4">
            <div className="bg-white/5 border border-white/10 rounded-xl p-4 space-y-3">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-widest">Medical Basics</p>
              <div>
                <span className="text-[10px] text-gray-400 uppercase">Blood Group</span>
                <p className="text-sm font-semibold text-white">B+ (Rh Positive)</p>

              <div>
                <span className="text-[10px] text-gray-400 uppercase">Allergies</span>

              <div>

                <p className="text-sm font-medium text-white">Type 2 Diabetes Mellitus, Hypertension</p>

            <div className="bg-white/5 border border-white/10 rounded-xl p-4 space-y-3">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-widest">Contacts & Insurance</p>
              <div>
                <span className="text-[10px] text-gray-400 uppercase">Emergency Contact</span>
                <p className="text-sm font-semibold text-white">Priya Sharma (Spouse) · +91 98100 XXXXX</p>
              </div>
              <div>
                <span className="text-[10px] text-gray-400 uppercase">Government Insurance</span>
                <p className="text-sm font-semibold text-emerald-400">Ayushman Bharat (AB-MP-2203XXXXX)</p>
              </div>
              <div>
                <span className="text-[10px] text-gray-400 uppercase">Current Medications</span>
                <p className="text-xs text-gray-400 leading-relaxed">Metformin 500mg, Amlodipine 5mg, Atorvastatin 20mg</p>

          <div className="flex flex-col sm:flex-row gap-3 pt-2">

  );

// ── DOCUMENTS VIEW ───────────────────────────────────────────────────────────
function DocumentsView() {
  const {user} = useApp();
  const [reports, setReports] = useState(user.reports);
  const [dragActive, setDragActive] = useState(false);
  const [search, setSearch] = useState('');

  const handleDrag = (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (e.type === "dragenter" || e.type === "dragover") {
      setDragActive(true);
    } else if (e.type === "dragleave") {
      setDragActive(false);
    }
  };

  const handleDrop = (e) => {
    e.preventDefault();
    e.stopPropagation();
    setDragActive(false);
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      const file = e.dataTransfer.files[0];
      if (file.size > 1 * 1024 * 1024) {
        alert("File size exceeds 1MB. Please upload a smaller document.");
        return;
      }
      const newDoc = {
        id: reports.length + 1,
        name: file.name.split('.')[0],
        date: 'Today',
        lab: 'User Upload',
        type: file.name.split('.').pop().toUpperCase(),
        size: `${(file.size / (1024 * 1024)).toFixed(1)} MB`,
        verified: false
      };
      setReports([newDoc, ...reports]);
    }
  };

  const fileInputRef = React.useRef(null);
  const triggerInput = () => {
    fileInputRef.current.click();
  };

  const handleFileInput = (e) => {
    if (e.target.files && e.target.files[0]) {
      const file = e.target.files[0];
      if (file.size > 1 * 1024 * 1024) {
        alert("File size exceeds 1MB. Please upload a smaller document.");
        return;
      }
      const newDoc = {
        id: reports.length + 1,
        name: file.name.split('.')[0],
        date: 'Today',
        lab: 'User Upload',
        type: file.name.split('.').pop().toUpperCase(),
        size: `${(file.size / (1024 * 1024)).toFixed(1)} MB`,
        verified: false
      };
      setReports([newDoc, ...reports]);
    }
  };

  const filtered = reports.filter(r => r.name.toLowerCase().includes(search.toLowerCase()) || r.lab.toLowerCase().includes(search.toLowerCase()));

  return (
    <div className="flex flex-col gap-5 animate-fade-in">
      <div className="flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-200 shadow-sm">
        <i className="ti ti-search text-gray-400 text-lg ml-2"/>
        <input 
          type="text" 
          value={search}
          onChange={(e)=>setSearch(e.target.value)}
          placeholder="Search documents by name or lab..." 
          className="flex-1 text-sm outline-none border-none text-navy-600 bg-transparent placeholder-gray-300"
        />
      </div>

      <div 
        onDragEnter={handleDrag}
        onDragOver={handleDrag}
        onDragLeave={handleDrag}
        onDrop={handleDrop}
        onClick={triggerInput}
        className={`border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all ${
          dragActive ? 'border-teal-400 bg-teal-50/50' : 'border-gray-200 hover:border-teal-300 hover:bg-teal-50/20'
        }`}
      >
        <input ref={fileInputRef} type="file" className="hidden" onChange={handleFileInput}/>
        <i className="ti ti-cloud-upload text-4xl text-gray-300 block mb-2"/>
        <p className="text-sm font-semibold text-navy-600">Drag files here or click to upload</p>
        <p className="text-xs text-gray-400 mt-1">PDF, DICOM, JPG, PNG up to 1MB</p>
      </div>

      <Card noPad>
        <CardHeader title="All Uploaded Documents" icon="ti-file-text"/>
        <div className="divide-y divide-gray-50">
          {filtered.length > 0 ? (
            filtered.map(r => (
              <div key={r.id} className="px-5 py-3.5 flex items-center justify-between gap-3 hover:bg-gray-50/50 transition-colors">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-teal-50 rounded-xl flex items-center justify-center text-teal-500 flex-shrink-0">
                    <i className="ti ti-file-text text-lg"/>
                  </div>
                  <div>
                    <p className="text-sm font-semibold text-navy-600">{r.name}</p>
                    <p className="text-xs text-gray-400">{r.lab} · {r.date} · {r.type} · {r.size}</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <Badge variant={r.verified ? 'green' : 'amber'}>{r.verified ? 'Verified' : 'Pending'}</Badge>
                  <button className="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-teal-500 cursor-pointer border-none bg-transparent transition-colors">
                    <i className="ti ti-download text-base"/>
                  </button>
                </div>
              </div>
            ))
          ) : (
            <div className="p-8 text-center text-gray-400 text-sm">No documents matching your search</div>
          )}
        </div>
      </Card>
    </div>
  );
}

// ── MAIN APP CONTAINER ────────────────────────────────────────────────────────
function App() {
  const {user, view} = useApp();

  if (!user) {
    return <LoginScreen />;
  }

  const renderView = () => {
    switch(view) {
      case 'dashboard': return <Dashboard />;
      case 'summary': return <SummaryView />;
      case 'medications': return <MedicationsView />;
      case 'diseases': return <DiseasesView />;
      case 'surgeries': return <SurgeriesView />;
      case 'reports': return <ReportsView />;
      case 'documents': return <DocumentsView />;
      case 'insurance': return <InsuranceView />;
      case 'emergency': return <EmergencyView />;
      case 'identity': return <IdentityView />;
      case 'access_control': return <AccessControlView />;
      case 'doctor_view': return <DoctorView />;
      default: return <Dashboard />;
    }
  };

  return (
    <div className="flex bg-gray-100 font-body min-h-screen">
      <Sidebar />
      <div className="flex-1 flex flex-col min-h-screen overflow-hidden">
        <Topbar />
        <main className="flex-1 overflow-y-auto p-6 scrollbar-thin max-h-[calc(100vh-60px)] bg-gray-100">
          {renderView()}
        </main>
      </div>
    </div>
  );
}

// ── BOOTSTRAP ─────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <AppProvider>
    <App />
  </AppProvider>
);
</script>
</body>
</html>
